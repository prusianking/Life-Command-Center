function renderWCanvas(mkKey,canvasId,isAvg,isCmp,cmpKey){
  const canvas=document.getElementById(canvasId);if(!canvas)return;const existing=Chart.getChart(canvas);if(existing)existing.destroy();
  const scores=isAvg?calcYrAvg():(D.wheelScores[mkKey]||{});const vals=D.areas.map(a=>scores[a.id]||1);const cmts=(D.wheelComments||{})[mkKey||WHEEL_MK]||{};
  const datasets=[{data:vals,backgroundColor:isAvg?'rgba(245,166,35,0.12)':'rgba(167,139,250,0.13)',borderColor:isAvg?'rgba(245,166,35,0.7)':'rgba(167,139,250,0.7)',borderWidth:2,pointBackgroundColor:D.areas.map(a=>a.color),pointRadius:4,pointHoverRadius:6,label:isAvg?'Year avg':'Month'}];
  if(isCmp&&cmpKey){const cs=D.wheelScores[cmpKey]||{};datasets.push({data:D.areas.map(a=>cs[a.id]||1),backgroundColor:'rgba(245,166,35,0.08)',borderColor:'rgba(245,166,35,0.6)',borderWidth:2,pointRadius:3,label:mkLbl(mkFromKey(cmpKey))})}
  new Chart(canvas,{type:'radar',data:{labels:D.areas.map(a=>a.name),datasets},options:{responsive:true,scales:{r:{min:0,max:10,ticks:{stepSize:2,color:'#55536e',font:{size:9,family:'DM Sans'},backdropColor:'transparent'},grid:{color:'rgba(255,255,255,0.06)'},pointLabels:{color:'#eae8f5',font:{size:10,family:'DM Sans'}},angleLines:{color:'rgba(255,255,255,0.06)'}}},plugins:{legend:{display:isCmp,labels:{color:'#9896b0',font:{size:10,family:'DM Sans'}}},tooltip:{callbacks:{label:function(ctx){const a=D.areas[ctx.dataIndex];const cmt=(D.wheelComments||{})[WHEEL_MK]?.[a?.id]||'';return[`Score: ${ctx.raw}`,cmt?`ЁЯТм ${cmt.slice(0,50)}`:null].filter(Boolean)}}}}}});
}
function renderWheelTable(){
  const container=document.getElementById('wheel-tbl');if(!container)return;
  const scores=D.wheelScores[WHEEL_MK]||{};const lastK=prevMkKey(WHEEL_MK);const lastScores=D.wheelScores[lastK]||{};const cmts=(D.wheelComments||{})[WHEEL_MK]||{};
  container.innerHTML=D.areas.map(a=>{const cur=scores[a.id]||1;const prev=lastScores[a.id]||1;const trend=cur>prev?'тЖС':cur<prev?'тЖУ':'тЖТ';const tCol=cur>prev?'var(--green)':cur<prev?'var(--rose)':'var(--text3)';const cmt=cmts[a.id]||'';const dots=Array.from({length:10},(_,i)=>`<div class="adot" style="background:${i<cur?a.color:'rgba(255,255,255,0.12)'};width:${i<cur?10:8}px;height:${i<cur?10:8}px"></div>`).join('');return`<div class="area-srow"><div class="asn" style="color:${a.color};font-family:'DM Sans',sans-serif" title="${esc(cmt||'No comment')}">${esc(a.name)}</div><input type="range" class="assl" min="1" max="10" value="${cur}" style="--area-c:${a.color}" oninput="setWS('${a.id}',parseInt(this.value));document.getElementById('asv-${a.id}').textContent=this.value"><div class="asv" style="color:${a.color}" id="asv-${a.id}">${cur}</div><div class="astr" style="color:${tCol}">${trend}</div><button class="ascmt-btn" onclick="openAreaCmt('${a.id}')">${cmt?'ЁЯТмтЬУ':'ЁЯТм'}</button></div><div class="area-dots-row">${dots}</div>${cmt?`<div class="area-cmt-text">ЁЯТм ${esc(cmt.slice(0,80))}${cmt.length>80?'...':''}</div>`:''}`}).join('');
}
function calcYrAvg(){const yr=new Date().getFullYear();const avg={};D.areas.forEach(a=>{let sum=0,cnt=0;for(let m=1;m<=12;m++){const k=`${yr}-${String(m).padStart(2,'0')}`;const sc=D.wheelScores[k];if(sc&&sc[a.id]){sum+=sc[a.id];cnt++}}avg[a.id]=cnt?Math.round(sum/cnt):1});return avg}
function setWS(areaId,val){if(!D.wheelScores[WHEEL_MK])D.wheelScores[WHEEL_MK]={};D.wheelScores[WHEEL_MK][areaId]=val;save();const cv=document.getElementById('wcvs');if(cv){const ch=Chart.getChart(cv);if(ch){ch.data.datasets[0].data=D.areas.map(a=>(D.wheelScores[WHEEL_MK]||{})[a.id]||1);ch.update()}}renderWheelTable()}
function openAreaCmt(areaId){const area=getArea(areaId);const cmt=((D.wheelComments||{})[WHEEL_MK]||{})[areaId]||'';openMo(`${area.name} тАФ ${mkLbl(mkFromKey(WHEEL_MK))}`,`<div class="fr"><label>Notes for this month</label><textarea id="ac-c" placeholder="How did this area go?">${esc(cmt)}</textarea></div>`,()=>{if(!D.wheelComments)D.wheelComments={};if(!D.wheelComments[WHEEL_MK])D.wheelComments[WHEEL_MK]={};D.wheelComments[WHEEL_MK][areaId]=document.getElementById('ac-c')?.value.trim()||'';save();closeMo();renderWheelTable()})}
function openCmpWheel(){const yr=new Date().getFullYear();const opts=[];for(let m=1;m<=12;m++){const k=`${yr}-${String(m).padStart(2,'0')}`;if(k!==WHEEL_MK)opts.push(`<option value="${k}">${MS[m-1]} ${yr}</option>`)}openMo('Compare Months',`<div class="fr"><label>Compare ${mkLbl(mkFromKey(WHEEL_MK))} with:</label><select id="cmp-m">${opts}</select></div>`,()=>{WHEEL_CMP=document.getElementById('cmp-m')?.value||null;closeMo();renderWheel()})}
function openManageAreas(){const sw=COLORS.map(c=>`<div class="sw-c" style="background:${c}" data-c="${c}" onclick="pickSwC(this)"></div>`).join('');const arows=D.areas.map(a=>`<div style="display:flex;align-items:center;gap:7px;padding:7px;background:var(--bg3);border-radius:var(--r-sm);margin-bottom:4px"><div style="width:10px;height:10px;border-radius:50%;background:${a.color}"></div><div style="flex:1;font-size:12px;font-family:'DM Sans',sans-serif">${esc(a.name)}</div><button class="btn bd bxs" onclick="delArea('${a.id}')">тЬХ</button></div>`).join('');openMo('Manage Areas',`${arows}<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)"><label>Add New Area</label><div style="display:flex;gap:7px;margin-top:4px"><input type="text" id="na-n" placeholder="Area name" style="flex:1"><button class="btn bv bsm" onclick="addArea()">Add</button></div><div style="margin-top:7px"><label>Color</label><div class="swatches" style="margin-top:4px">${sw}</div></div><input type="hidden" id="na-c" value="${COLORS[0]}"></div>`,null);document.getElementById('m-ok').style.display='none';setTimeout(()=>document.querySelector('.sw-c')?.classList.add('sel'),30)}
function pickSwC(el){document.querySelectorAll('.sw-c').forEach(s=>s.classList.remove('sel'));el.classList.add('sel');const i=document.getElementById('na-c')||document.getElementById('hf-c')||document.getElementById('tp-c');if(i)i.value=el.dataset.c}
function addArea(){const n=document.getElementById('na-n')?.value.trim();const c=document.getElementById('na-c')?.value||COLORS[0];if(!n)return;D.areas.push({id:uid(),name:n,color:c});save();closeMo();renderWheel()}
function delArea(id){if(!confirm('Delete area?'))return;D.areas=D.areas.filter(a=>a.id!==id);save();closeMo();renderWheel()}

// тХРтХРтХР ROUTINES тХРтХРтХР
function renderRoutines(){
  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div style="font-size:12px;color:var(--text2);font-family:'DM Sans',sans-serif">Today: <strong>${Array.from(new Set([dayOfWeek(td())])).map(d=>DS[d]).join('')}</strong></div><button class="btn bv bsm" onclick="openAddRoutine()">+ New</button></div>`;
  D.routines.forEach(r=>{
    const done=r.tasks.filter(t=>t.done).length,tot=r.tasks.length,pct=tot?Math.round(done/tot*100):0;
    const isActive=routineActiveToday(r);const hist=r.history||[];const last7=Array.from({length:7},(_,i)=>addD(td(),-6+i));
    html+=`<div class="rt-card" style="${!isActive?'opacity:.65':''}"><div class="rt-hd" onclick="toggleRCard('${r.id}')">
      <span style="font-size:18px">${r.emoji}</span>
      <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif">${esc(r.name)}</div><div style="font-size:9px;color:var(--text3);margin-top:1px;font-family:'DM Sans',sans-serif">${r.days?.map(d=>DS[d]).join(' ┬╖ ')||'тАФ'}${!isActive?' (not today)':''}</div><div class="mini-heat">${last7.map(d=>`<div class="mh-d ${hist.includes(d)?'on':''}" title="${d}"></div>`).join('')}</div></div>
      <div style="display:flex;align-items:center;gap:7px" onclick="event.stopPropagation()">${r.streak>0?`<span style="font-size:9px;color:var(--amber)">ЁЯФе${r.streak}</span>`:''}<div><div style="font-size:8px;color:var(--text3);text-align:center;margin-bottom:2px;font-family:'DM Sans',sans-serif">Today</div><div class="sw ${r.showInToday&&r.enabled?'on':''}" onclick="toggleRToday('${r.id}')"></div></div></div>
    </div>
    <div class="rt-body" id="rb-${r.id}">
      <div class="f2" style="margin-bottom:9px"><div class="fr"><label>Time Block</label><select style="font-size:11px;padding:5px 8px;font-family:'DM Sans',sans-serif" onchange="setRTb('${r.id}',this.value)">${TBLOCKS.map(b=>`<option value="${b.id}"${r.tbId===b.id?' selected':''}>${b.icon} ${b.name}</option>`).join('')}</select></div><div class="fr"><label>Actions</label><button class="btn bd bxs" onclick="delRoutine('${r.id}')">Delete</button></div></div>
      <div style="margin-bottom:9px"><label style="margin-bottom:4px;display:block">Active days:</label><div class="day-sched">${DS.map((d,i)=>`<div class="ds-btn ${r.days?.includes(i)?'on':''}" onclick="toggleRDay('${r.id}',${i})">${d}</div>`).join('')}</div></div>
      ${r.affirmations?`<div style="background:rgba(167,139,250,0.07);border:1px solid rgba(167,139,250,0.2);border-radius:6px;padding:8px;margin-bottom:7px;font-size:11px;color:var(--violet);font-style:italic;line-height:1.6;font-family:'DM Sans',sans-serif">${esc(r.affirmations).replace(/\n/g,'<br>')}</div>`:``}
      ${r.mediaUrl?`<a href="${esc(r.mediaUrl)}" target="_blank" class="media-btn" style="margin-bottom:7px">тЦ╢ Play</a>`:''}
      <button class="btn bg bxs" style="margin-bottom:8px" onclick="editRoutineMeta('${r.id}')">тЬПя╕П Affirmations & Link</button>
      <div class="progb" style="margin-bottom:8px"><div class="pfill" style="width:${pct}%;background:var(--violet)"></div></div>
      ${r.tasks.map((task,idx)=>`<div class="rt-task"><div style="display:flex;flex-direction:column;gap:1px;margin-right:3px">${idx>0?`<button class="btn bg" style="width:20px;height:16px;padding:0;font-size:8px;min-height:16px" onclick="moveRTask('${r.id}',${idx},-1)">тЖС</button>`:'<div style="height:16px"></div>'} ${idx<r.tasks.length-1?`<button class="btn bg" style="width:20px;height:16px;padding:0;font-size:8px;min-height:16px" onclick="moveRTask('${r.id}',${idx},1)">тЖУ</button>`:'<div style="height:16px"></div>'}</div><button class="chk ${task.done?'on':''}" onclick="toggleRTask('${r.id}','${task.id}')" style="min-width:22px">${task.done?'тЬУ':''}</button><div style="flex:1"><div style="font-size:12px;font-family:'DM Sans',sans-serif;${task.done?'text-decoration:line-through;color:var(--text3)':''}">${esc(task.title)}</div>${task.cmt?`<div style="font-size:10px;color:var(--text3);font-family:'DM Sans',sans-serif">ЁЯТм ${esc(task.cmt)}</div>`:''} ${task.mediaUrl?`<a href="${esc(task.mediaUrl)}" target="_blank" class="media-btn" style="font-size:9px;padding:2px 5px">тЦ╢</a>`:''}</div>${WHY[task.title]?`<button class="rt-why" onclick="showWhy(event,'${esc(WHY[task.title]||'')}')">Why?</button>`:''}<button class="btn bg bic bxs" onclick="editRTask('${r.id}','${task.id}')">тЬПя╕П</button><button class="btn bd bic bxs" onclick="delRTask('${r.id}','${task.id}')">тЬХ</button></div>`).join('')}
      <button class="btn bg bsm" style="margin-top:8px;width:100%" onclick="addRTask('${r.id}')">+ Add Step</button>
      ${(r.subRoutines||[]).length>0?`<div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border)"><div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:7px;font-family:'DM Sans',sans-serif">Sub-routines</div>${(r.subRoutines||[]).map(sr=>`<div class="sub-rt"><div class="sub-rt-hd" onclick="toggleSubRt('${sr.id}')"><span style="font-size:15px">${sr.emoji||'тАв'}</span><div style="flex:1"><div style="font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif">${esc(sr.name)}</div><div style="font-size:9px;color:var(--text3);font-family:'DM Sans',sans-serif">${sr.days?.map(d=>DS[d]).join(' ┬╖ ')||'тАФ'}</div></div><button class="btn bd bxs" onclick="event.stopPropagation();delSubRt('${r.id}','${sr.id}')">тЬХ</button></div><div class="sub-rt-body" id="srb-${sr.id}"><div style="margin-bottom:8px"><label style="margin-bottom:4px;display:block">Days:</label><div class="day-sched">${DS.map((d,i)=>`<div class="ds-btn ${sr.days?.includes(i)?'on':''}" onclick="toggleSubRDay('${r.id}','${sr.id}',${i})">${d}</div>`).join('')}</div></div>${sr.mediaUrl?`<a href="${esc(sr.mediaUrl)}" target="_blank" class="media-btn" style="margin-bottom:6px">тЦ╢ Media</a>`:''}<button class="btn bg bxs" style="margin-bottom:7px" onclick="editSubRMedia('${r.id}','${sr.id}')">+ Link</button>${sr.tasks.map(task=>`<div class="rt-task"><button class="chk ${task.done?'on':''}" onclick="toggleSubRTaskDirect('${r.id}','${sr.id}','${task.id}')" style="min-width:22px">${task.done?'тЬУ':''}</button><div style="flex:1"><div style="font-size:12px;font-family:'DM Sans',sans-serif;${task.done?'text-decoration:line-through;color:var(--text3)':''}">${esc(task.title)}</div>${task.cmt?`<div style="font-size:10px;color:var(--text3);font-family:'DM Sans',sans-serif">ЁЯТм ${esc(task.cmt)}</div>`:''}</div></div>`).join('')}<button class="btn bg bxs" style="margin-top:6px" onclick="addSubRTask('${r.id}','${sr.id}')">+ Step</button></div></div>`).join('')}<button class="btn bg bsm" style="margin-top:8px;width:100%" onclick="openAddSubRt('${r.id}')">+ Add Sub-routine</button></div>`:''}
    </div></div>`;
  });
  document.getElementById('s-routines').innerHTML=html;
}

function toggleRCard(id){document.getElementById('rb-'+id)?.classList.toggle('open')}
function toggleSubRt(id){document.getElementById('srb-'+id)?.classList.toggle('open')}
function toggleRToday(id){const r=D.routines.find(x=>x.id===id);if(!r)return;r.showInToday=!r.showInToday;r.enabled=r.showInToday;save();renderRoutines()}
function toggleRDay(rid,day){const r=D.routines.find(x=>x.id===rid);if(!r)return;if(!r.days)r.days=[];const idx=r.days.indexOf(day);if(idx>=0)r.days.splice(idx,1);else r.days.push(day);save();renderRoutines()}
function toggleSubRDay(rid,srid,day){const r=D.routines.find(x=>x.id===rid);if(!r)return;const sr=r.subRoutines?.find(x=>x.id===srid);if(!sr)return;if(!sr.days)sr.days=[];const idx=sr.days.indexOf(day);if(idx>=0)sr.days.splice(idx,1);else sr.days.push(day);save();renderRoutines()}
function setRTb(id,val){const r=D.routines.find(x=>x.id===id);if(!r)return;r.tbId=val;save()}
function moveRTask(rid,idx,dir){const r=D.routines.find(x=>x.id===rid);if(!r)return;const ni=idx+dir;if(ni<0||ni>=r.tasks.length)return;[r.tasks[idx],r.tasks[ni]]=[r.tasks[ni],r.tasks[idx]];save();renderRoutines()}
function delRTask(rid,tid){const r=D.routines.find(x=>x.id===rid);if(!r)return;r.tasks=r.tasks.filter(t=>t.id!==tid);save();renderRoutines()}
function delRoutine(id){if(!confirm('Delete routine?'))return;D.routines=D.routines.filter(r=>r.id!==id);save();renderRoutines()}
function delSubRt(rid,srid){if(!confirm('Delete sub-routine?'))return;const r=D.routines.find(x=>x.id===rid);if(!r)return;r.subRoutines=r.subRoutines.filter(sr=>sr.id!==srid);save();renderRoutines()}
function delSubRTask(rid,srid,tid){const r=D.routines.find(x=>x.id===rid);if(!r)return;const sr=r.subRoutines?.find(x=>x.id===srid);if(!sr)return;sr.tasks=sr.tasks.filter(t=>t.id!==tid);save();renderRoutines()}
function toggleSubRTaskDirect(rid,srid,tid){const r=D.routines.find(x=>x.id===rid);if(!r)return;const sr=r.subRoutines?.find(x=>x.id===srid);if(!sr)return;const t=sr.tasks.find(x=>x.id===tid);if(!t)return;t.done=!t.done;if(t.done)confetti();save();renderRoutines()}
function editRoutineMeta(rid){const r=D.routines.find(x=>x.id===rid);if(!r)return;openMo('Affirmations & Link',`<div class="fr"><label>Affirmations (one per line)</label><textarea id="aff-t" style="min-height:90px" placeholder="I am focused.\nI make progress every day.">${esc(r.affirmations||'')}</textarea></div><div class="fr"><label>Media URL</label><input type="url" id="med-u" value="${esc(r.mediaUrl||'')}" placeholder="https://..."></div>`,()=>{r.affirmations=document.getElementById('aff-t')?.value||'';r.mediaUrl=document.getElementById('med-u')?.value.trim()||'';save();closeMo();renderRoutines()})}
function editRTask(rid,tid){const r=D.routines.find(x=>x.id===rid);if(!r)return;const t=r.tasks.find(x=>x.id===tid);if(!t)return;openMo('Edit Step',`<div class="fr"><label>Title</label><input type="text" id="rt-t" value="${esc(t.title)}"></div><div class="fr"><label>Comment</label><textarea id="rt-c">${esc(t.cmt||'')}</textarea></div><div class="fr"><label>Media URL</label><input type="url" id="rt-m" value="${esc(t.mediaUrl||'')}" placeholder="https://..."></div>`,()=>{t.title=document.getElementById('rt-t')?.value.trim()||t.title;t.cmt=document.getElementById('rt-c')?.value.trim()||'';t.mediaUrl=document.getElementById('rt-m')?.value.trim()||'';save();closeMo();renderRoutines()})}
function addRTask(rid){const r=D.routines.find(x=>x.id===rid);if(!r)return;openMo('Add Step',`<div class="fr"><label>Title</label><input type="text" id="rt-t" placeholder="What to do..."></div><div class="fr"><label>Comment</label><input type="text" id="rt-c" placeholder="Tips..."></div><div class="fr"><label>Media URL</label><input type="url" id="rt-m" placeholder="https://..."></div>`,()=>{const title=document.getElementById('rt-t')?.value.trim();if(!title)return;r.tasks.push({id:uid(),title,done:false,cmt:document.getElementById('rt-c')?.value.trim()||'',mediaUrl:document.getElementById('rt-m')?.value.trim()||''});save();closeMo();renderRoutines()})}
function openAddRoutine(){openMo('New Routine',`<div class="f2"><div class="fr"><label>Emoji</label><input type="text" id="rn-e" placeholder="ЁЯФБ" maxlength="2"></div><div class="fr"><label>Name</label><input type="text" id="rn-n" placeholder="My Routine"></div></div><div class="fr"><label>Time Block</label><select id="rn-t">${TBLOCKS.map(b=>`<option value="${b.id}">${b.icon} ${b.name}</option>`).join('')}</select></div>`,()=>{const name=document.getElementById('rn-n')?.value.trim();if(!name)return;D.routines.push({id:uid(),name,emoji:document.getElementById('rn-e')?.value||'ЁЯФБ',tbId:document.getElementById('rn-t')?.value||'mo',days:[0,1,2,3,4,5,6],enabled:false,showInToday:false,streak:0,lastDone:'',history:[],affirmations:'',mediaUrl:'',subRoutines:[],tasks:[]});save();closeMo();renderRoutines()})}
function openAddSubRt(rid){openMo('New Sub-routine',`<div class="f2"><div class="fr"><label>Emoji</label><input type="text" id="sr-e" placeholder="ЁЯПГ" maxlength="2"></div><div class="fr"><label>Name</label><input type="text" id="sr-n" placeholder="Running"></div></div>`,()=>{const name=document.getElementById('sr-n')?.value.trim();if(!name)return;const r=D.routines.find(x=>x.id===rid);if(!r)return;if(!r.subRoutines)r.subRoutines=[];r.subRoutines.push({id:uid(),name,emoji:document.getElementById('sr-e')?.value||'тАв',days:[],mediaUrl:'',tasks:[]});save();closeMo();renderRoutines()})}
function addSubRTask(rid,srid){const r=D.routines.find(x=>x.id===rid);if(!r)return;const sr=r.subRoutines?.find(x=>x.id===srid);if(!sr)return;openMo('Add Step',`<div class="fr"><label>Title</label><input type="text" id="rt-t" placeholder="Exercise/step..."></div><div class="fr"><label>Notes (sets, reps, duration)</label><input type="text" id="rt-c" placeholder="4├Ч8, 30 min..."></div>`,()=>{const title=document.getElementById('rt-t')?.value.trim();if(!title)return;sr.tasks.push({id:uid(),title,done:false,cmt:document.getElementById('rt-c')?.value.trim()||'',mediaUrl:''});save();closeMo();renderRoutines()})}
function editSubRMedia(rid,srid){const r=D.routines.find(x=>x.id===rid);if(!r)return;const sr=r.subRoutines?.find(x=>x.id===srid);if(!sr)return;openMo('Sub-routine Media',`<div class="fr"><label>Media URL</label><input type="url" id="sr-m" value="${esc(sr.mediaUrl||'')}" placeholder="https://..."></div>`,()=>{sr.mediaUrl=document.getElementById('sr-m')?.value.trim()||'';save();closeMo();renderRoutines()})}

// тХРтХРтХР FINANCE тХРтХРтХР
function renderFinance(){
  if(!D.finance)D.finance={transactions:[],budgets:{}};
  const txns=D.finance.transactions||[];
  const curMonthTxns=txns.filter(t=>t.date&&t.date.startsWith(FIN_MONTH));
  const income=curMonthTxns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expenses=curMonthTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const balance=income-expenses;

  let html=`<div class="tab-bar"><button class="tab ${FIN_VIEW==='month'?'active':''}" onclick="setFV('month')">This Month</button><button class="tab ${FIN_VIEW==='history'?'active':''}" onclick="setFV('history')">History</button><button class="tab ${FIN_VIEW==='budget'?'active':''}" onclick="setFV('budget')">Budget</button></div>`;

  if(FIN_VIEW==='month'||FIN_VIEW==='history'){
    if(FIN_VIEW==='history'){html+=`<div class="tnav"><button class="tnav-b" onclick="navFM(-1)">тА╣</button><div class="tnav-l">${mkLbl(mkFromKey(FIN_MONTH))}</div><button class="tnav-b" onclick="navFM(1)">тА║</button><button class="today-pill" onclick="FIN_MONTH=mk();renderFinance()">Now</button></div>`}

    // Quick add
    html+=`<div class="card" style="margin-bottom:10px">
      <div class="type-toggle"><button class="type-btn exp ${FIN_TYPE==='expense'?'on':''}" onclick="setFT('expense')">ЁЯТ╕ Expense</button><button class="type-btn inc ${FIN_TYPE==='income'?'on':''}" onclick="setFT('income')">ЁЯТ░ Income</button></div>
      <div style="text-align:center;margin-bottom:10px"><input class="fin-amount" type="number" id="fin-amt" placeholder="0.00" step="0.01" min="0"></div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px">${FIN_CATS.map(c=>`<div class="cat-chip ${FIN_CAT===c.id?'sel':''}" onclick="setFC('${c.id}')">${c.emoji} ${c.name}</div>`).join('')}</div>
      <div class="f2" style="margin-bottom:10px">
        <div><input type="text" id="fin-desc" placeholder="Description (optional)"></div>
        <div><input type="date" id="fin-date" value="${td()}"></div>
      </div>
      <button class="btn bv" style="width:100%;justify-content:center" onclick="addTransaction()">ЁЯТ╛ Save</button>
    </div>`;

    // Stats
    html+=`<div class="stats-row" style="margin-bottom:12px">
      <div class="stat"><div class="stat-n" style="color:var(--green)">${fmtAmt(income)}</div><div class="stat-l">Income</div></div>
      <div class="stat"><div class="stat-n" style="color:var(--rose)">${fmtAmt(expenses)}</div><div class="stat-l">Expenses</div></div>
      <div class="stat"><div class="stat-n" style="color:${balance>=0?'var(--green)':'var(--rose)'}">${fmtAmt(balance)}</div><div class="stat-l">Balance</div></div>
    </div>`;

    // Spending by category
    const expByCat={};curMonthTxns.filter(t=>t.type==='expense').forEach(t=>{expByCat[t.catId]=(expByCat[t.catId]||0)+t.amount});
    const sortedCats=Object.entries(expByCat).sort((a,b)=>b[1]-a[1]);
    if(sortedCats.length){
      html+=`<div class="card" style="margin-bottom:10px"><div style="font-size:13px;font-weight:600;margin-bottom:9px;font-family:'DM Sans',sans-serif">By Category</div>`;
      sortedCats.forEach(([catId,amt])=>{
        const cat=finCat(catId);const pct=expenses?Math.round(amt/expenses*100):0;
        const budget=D.finance.budgets[catId];const bPct=budget?Math.round(amt/budget*100):0;
        const bColor=budget?(bPct>100?'var(--rose)':bPct>80?'var(--amber)':'var(--green)'):'var(--violet)';
        html+=`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:18px;flex-shrink:0">${cat.emoji}</span>
          <div style="flex:1;min-width:0"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif">${cat.name}</span><span style="font-size:12px;font-weight:600;color:var(--rose);font-family:'DM Sans',sans-serif">${fmtAmt(amt)}</span></div>
          <div style="height:5px;background:var(--bg4);border-radius:3px;overflow:hidden"><div style="height:100%;border-radius:3px;width:${pct}%;background:${bColor}"></div></div>
          <div style="font-size:9px;color:var(--text3);margin-top:2px;font-family:'DM Sans',sans-serif">${pct}% of expenses${budget?` ┬╖ Budget: ${fmtAmt(budget)} (${bPct}%)`:''}</div></div>
        </div>`;
      });
      html+=`</div>`;
    }

    // Insights
    if(sortedCats.length>0){
      const top=finCat(sortedCats[0][0]);html+=`<div style="display:flex;flex-wrap:wrap;margin-bottom:10px"><span class="insight-chip">ЁЯТб Biggest spend: ${top.emoji} ${top.name} (${fmtAmt(sortedCats[0][1])})</span>${balance<0?`<span class="insight-chip" style="color:var(--rose)">тЪая╕П Over budget by ${fmtAmt(Math.abs(balance))}</span>`:''}</div>`;
    }

    // Recent transactions
    const recent=curMonthTxns.slice().reverse().slice(0,20);
    if(recent.length){
      html+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px"><div style="font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif">Transactions</div><button class="btn bg bxs" onclick="exportCSV()">тмЗ CSV</button></div>`;
      const byDay={};recent.forEach(t=>{if(!byDay[t.date])byDay[t.date]=[];byDay[t.date].push(t)});
      Object.entries(byDay).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([date,txs])=>{
        html+=`<div style="font-size:11px;color:var(--text3);padding:7px 0 4px;font-weight:600;font-family:'DM Sans',sans-serif">${fmtD(date)}</div>`;
        txs.forEach(t=>{const cat=finCat(t.catId);html+=`<div class="fin-tx"><span class="fin-tx-em">${cat.emoji}</span><div class="fin-tx-info"><div class="fin-tx-desc">${esc(t.desc||cat.name)}</div><div class="fin-tx-meta">${cat.name} ┬╖ ${t.date}</div></div><div style="display:flex;align-items:center;gap:5px"><div class="fin-tx-amt" style="color:${t.type==='income'?'var(--green)':'var(--rose)'}">
          ${t.type==='income'?'+':'-'}${fmtAmt(t.amount)}</div><button class="btn bd bic bxs" onclick="delTx('${t.id}')">тЬХ</button></div></div>`});
      });
      html+=`</div>`;
    }else html+=`<div style="text-align:center;padding:24px;color:var(--text3);font-family:'DM Sans',sans-serif">No transactions this month. Add your first one above!</div>`;

    // 6-month chart
    html+=`<div class="card" style="margin-top:10px"><div style="font-size:13px;font-weight:600;margin-bottom:9px;font-family:'DM Sans',sans-serif">6-Month Trend</div><div style="position:relative;height:180px"><canvas id="fin-chart"></canvas></div></div>`;
  }else{
    // Budget view
    html+=`<div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:9px;font-family:'DM Sans',sans-serif">Monthly Budgets</div>`;
    FIN_CATS.filter(c=>c.id!=='income').forEach(c=>{
      const bgt=D.finance.budgets[c.id]||0;
      const spent=curMonthTxns.filter(t=>t.catId===c.id&&t.type==='expense').reduce((s,t)=>s+t.amount,0);
      const pct=bgt?Math.round(spent/bgt*100):0;const bColor=pct>100?'var(--rose)':pct>80?'var(--amber)':'var(--green)';
      html+=`<div class="budget-row"><span style="font-size:16px">${c.emoji}</span><div style="flex:1;min-width:0"><div class="budget-cat">${c.name}</div><div class="budget-bar"><div class="budget-bar-fill" style="width:${Math.min(100,pct)}%;background:${bColor}"></div></div></div><div style="text-align:right"><div style="font-size:11px;color:var(--rose);font-weight:600;font-family:'DM Sans',sans-serif">${fmtAmt(spent)}</div><div style="font-size:10px;color:var(--text3);font-family:'DM Sans',sans-serif">/ ${bgt?fmtAmt(bgt):'No budget'}</div></div><div style="width:50px"><input type="number" value="${bgt||''}" placeholder="0" style="width:50px;font-size:11px;padding:4px 5px;text-align:center" onchange="setBudget('${c.id}',parseFloat(this.value)||0)"></div></div>`;
    });
    html+=`</div>`;
  }

  document.getElementById('s-finance').innerHTML=html;
  if(FIN_VIEW==='month'||FIN_VIEW==='history')setTimeout(()=>renderFinChart(txns),100);
}

function setFV(v){FIN_VIEW=v;renderFinance()}
function setFT(t){FIN_TYPE=t;renderFinance()}
function setFC(c){FIN_CAT=c;renderFinance()}
function navFM(n){const[y,mo]=FIN_MONTH.split('-');const d=new Date(parseInt(y),parseInt(mo)-1+n,1);FIN_MONTH=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;renderFinance()}
function addTransaction(){
  const amt=parseFloat(document.getElementById('fin-amt')?.value);
  if(!amt||amt<=0){alert('Enter an amount');return}
  if(!FIN_CAT){alert('Select a category');return}
  if(!D.finance)D.finance={transactions:[],budgets:{}};
  D.finance.transactions.push({id:uid(),amount:amt,catId:FIN_CAT,type:FIN_TYPE,desc:document.getElementById('fin-desc')?.value.trim()||'',date:document.getElementById('fin-date')?.value||td(),createdAt:td()});
  save();const el=document.getElementById('fin-amt');if(el)el.value='';renderFinance();confetti();
}
function delTx(id){D.finance.transactions=D.finance.transactions.filter(t=>t.id!==id);save();renderFinance()}
function setBudget(catId,val){if(!D.finance.budgets)D.finance.budgets={};D.finance.budgets[catId]=val;save()}
function renderFinChart(txns){
  const canvas=document.getElementById('fin-chart');if(!canvas)return;
  const existing=Chart.getChart(canvas);if(existing)existing.destroy();
  const labels=[],incD=[],expD=[];
  for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);const mk2=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;labels.push(MS[d.getMonth()]);const mTx=txns.filter(t=>t.date&&t.date.startsWith(mk2));incD.push(mTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0));expD.push(mTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0))}
  new Chart(canvas,{type:'bar',data:{labels,datasets:[{label:'Income',data:incD,backgroundColor:'rgba(52,211,153,0.6)',borderRadius:4},{label:'Expenses',data:expD,backgroundColor:'rgba(251,113,133,0.6)',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#9896b0',font:{size:10,family:'DM Sans'}}}},scales:{x:{ticks:{color:'#55536e',font:{size:9,family:'DM Sans'}},grid:{display:false}},y:{ticks:{color:'#55536e',font:{size:9,family:'DM Sans'},callback:v=>`${D.currency||'тВм'}${v}`},grid:{color:'rgba(255,255,255,0.04)'}}}}});
}
function exportCSV(){
  const txns=D.finance.transactions||[];const rows=[['Date','Type','Category','Amount','Description'],...txns.map(t=>[t.date,t.type,finCat(t.catId).name,t.amount,t.desc||''])];const csv=rows.map(r=>r.join(',')).join('\n');const b=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`finance-${td()}.csv`;a.click();
}

    <div class="fr"><label>Area</label><select id="gf-a">${aOpts}</select></div>`;

function toggleMChip(el){el.classList.toggle('sel')}
function refreshMChips(yr){const w=document.getElementById('mchips-wrap');if(!w)return;const sel=Array.from(w.querySelectorAll('.mchip.sel')).map(c=>c.dataset.mk.split('-')[1]);w.innerHTML=MS.map((m,i)=>{const mk2=`${yr}-${String(i+1).padStart(2,'0')}`;const s=sel.includes(String(i+1).padStart(2,'0'));return`<div class="mchip ${s?'sel':''}" data-mk="${mk2}" onclick="toggleMChip(this)">${m}</div>`}).join('')}
function getSelMonths(){return Array.from(document.querySelectorAll('#mchips-wrap .mchip.sel')).map(c=>c.dataset.mk)}
function openAddGoal(){openMo('New Goal',goalFormH(null),()=>{const title=document.getElementById('gf-t')?.value.trim();if(!title)return;D.goals.unshift({id:uid(),title,desc:document.getElementById('gf-d')?.value.trim()||'',ptype:document.getElementById('gf-pt')?.value||'pers',priority:document.getElementById('gf-p')?.value||'med',year:document.getElementById('gf-yr')?.value||String(new Date().getFullYear()),months:getSelMonths(),endDate:document.getElementById('gf-ed')?.value||'',areaId:document.getElementById('gf-a')?.value||D.areas[0]?.id||'',assignedDays:{},progress:0,done:false,createdAt:td()});G_MODE=document.getElementById('gf-pt')?.value||'pers';save();closeMo();renderGoals()})}
function editGoal(id){const g=D.goals.find(x=>x.id===id);if(!g)return;openMo('Edit Goal',goalFormH(g),()=>{g.title=document.getElementById('gf-t')?.value.trim()||g.title;g.desc=document.getElementById('gf-d')?.value.trim()||'';g.ptype=document.getElementById('gf-pt')?.value||'pers';g.priority=document.getElementById('gf-p')?.value||'med';g.year=document.getElementById('gf-yr')?.value||g.year;g.months=getSelMonths();g.endDate=document.getElementById('gf-ed')?.value||'';g.areaId=document.getElementById('gf-a')?.value||g.areaId;save();closeMo();renderGoals()})}
function delGoal(id){if(!confirm('Delete goal?'))return;D.goals=D.goals.filter(g=>g.id!==id);D.tasks=D.tasks.filter(t=>t.goalId!==id);save();renderGoals()}

// MEETING FORM
function meetFormH(m,date){return`<div class="fr"><label>Title *</label><input type="text" id="mf-t" value="${esc(m?.title||'')}" placeholder="Meeting title"></div><div class="f2"><div class="fr"><label>Date</label><input type="date" id="mf-d" value="${m?.date||date||td()}"></div><div class="fr"><label>Type</label><select id="mf-pt"><option value="pro"${(m?.ptype||'pro')==='pro'?' selected':''}>ЁЯТ╝ Pro</option><option value="pers"${m?.ptype==='pers'?' selected':''}>ЁЯМ▒ Personal</option></select></div></div><div class="f2"><div class="fr"><label>Start</label><select id="mf-st">${timeOptions(m?.startTime||'')}</select></div><div class="fr"><label>End</label><select id="mf-et">${timeOptions(m?.endTime||'')}</select></div></div><div class="fr"><label>Location</label><input type="text" id="mf-l" value="${esc(m?.location||'')}" placeholder="Room, URL..."></div><div class="fr"><label>Notes</label><textarea id="mf-n">${esc(m?.notes||'')}</textarea></div>`}
function openAddMeet(date){openMo('New Meeting',meetFormH(null,date),()=>{const title=document.getElementById('mf-t')?.value.trim();if(!title)return;if(!D.meetings)D.meetings=[];D.meetings.unshift({id:uid(),title,date:document.getElementById('mf-d')?.value||td(),ptype:document.getElementById('mf-pt')?.value||'pro',startTime:document.getElementById('mf-st')?.value||'',endTime:document.getElementById('mf-et')?.value||'',location:document.getElementById('mf-l')?.value.trim()||'',notes:document.getElementById('mf-n')?.value.trim()||'',done:false,createdAt:td()});save();closeMo();renderAll()})}
function editMeet(id){const m=(D.meetings||[]).find(x=>x.id===id);if(!m)return;openMo('Edit Meeting',meetFormH(m),()=>{m.title=document.getElementById('mf-t')?.value.trim()||m.title;m.date=document.getElementById('mf-d')?.value||m.date;m.ptype=document.getElementById('mf-pt')?.value||'pro';m.startTime=document.getElementById('mf-st')?.value||'';m.endTime=document.getElementById('mf-et')?.value||'';m.location=document.getElementById('mf-l')?.value.trim()||'';m.notes=document.getElementById('mf-n')?.value.trim()||'';save();closeMo();renderAll()})}
function delMeetById(id){if(!confirm('Delete meeting?'))return;D.meetings=(D.meetings||[]).filter(m=>m.id!==id);save();renderAll()}
function toggleMeet(id){const m=(D.meetings||[]).find(x=>x.id===id);if(!m)return;m.done=!m.done;if(m.done)confetti();save();renderAll()}

// FOCUS
function openFoc(){const top=D.tasks.filter(t=>!t.done&&t.priority==='crit').concat(D.tasks.filter(t=>!t.done&&t.priority==='high')).slice(0,3);document.getElementById('foc-list').innerHTML=top.length?top.map(t=>taskH(t,true)).join(''):`<div style="text-align:center;padding:40px;color:var(--text2)"><div style="font-size:32px">ЁЯОЙ</div><div style="margin-top:8px;font-family:'DM Sans',sans-serif">No critical tasks!</div></div>`;document.getElementById('foc').classList.add('open')}
function closeFoc(){document.getElementById('foc').classList.remove('open')}

// CONFETTI
function confetti(){const cols=['#f5a623','#2dd4bf','#a78bfa','#34d399','#fb7185','#60a5fa'];for(let i=0;i<14;i++){setTimeout(()=>{const el=document.createElement('div');el.className='cf';el.style.cssText=`left:${Math.random()*100}vw;top:0;background:${cols[Math.floor(Math.random()*cols.length)]};animation-delay:${Math.random()*.2}s;animation-duration:${.7+Math.random()*.5}s`;document.body.appendChild(el);setTimeout(()=>el.remove(),1200)},i*15)}}

// SCREENS
function goTo(id){CUR_SCR=id;document.querySelectorAll('.scr').forEach(s=>s.classList.remove('active'));document.getElementById('s-'+id)?.classList.add('active');const titles={today:'Life Planner',calendar:'Calendar',goals:'Goals',habits:'Habits',reminders:'Notes & Reminders',wheel:'Wheel of Life',routines:'Routines',finance:'Finance',settings:'Settings'};document.getElementById('hdr-t').textContent=titles[id]||'Life Planner';buildNav();renderSection(id)}
function renderSection(id){if(id==='today')renderToday();else if(id==='calendar')renderCalendar();else if(id==='goals')renderGoals();else if(id==='habits')renderHabits();else if(id==='reminders')renderReminders();else if(id==='wheel')renderWheel();else if(id==='routines')renderRoutines();else if(id==='finance')renderFinance();else if(id==='settings')renderSettings()}
function renderAll(){renderSection(CUR_SCR)}

// INIT
async function init(){
  checkRe();updStreak();
  if(!D.meetings)D.meetings=[];if(!D.wheelComments)D.wheelComments={};
  if(!D.intentions)D.intentions={};if(!D.moods)D.moods={};
  if(!D.weekReviews)D.weekReviews={};if(!D.reminders)D.reminders=[];
  if(!D.habits)D.habits=defHabits();if(!D.topics)D.topics=defTopics();
  if(!D.finance)D.finance={transactions:[],budgets:{}};
  if(!D.navOrder)D.navOrder=DEFAULT_NAV_ORDER;
  buildNav();
  renderSection('today');
  document.addEventListener('click',()=>document.getElementById('tip').style.display='none',{passive:true});
  await syncDn();renderAll();
}
init();
</script>
